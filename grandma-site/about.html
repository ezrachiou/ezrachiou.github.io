<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ABOUT</title>
    <link rel="stylesheet" href="style.css">
    <style>
      .english-translate .cn {
        display: none;
      }
      .mandarin-translate .en {
        display: none;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="bttns"><a href="search.html"><button class="search">嘿!</button></a></div>
      <div class="gif"><a href="index.html"><img class="rabbit" src="images/rabbit.png"></img></a></div>
      <ul class="nav-bar">
          <li class="about"><a href="about.html">about</a></li>
          <li class="hai"><a href="hai.html">嗨!</a></li>
      </ul>
     
  </nav>

<section>
    <div class="english-translate">
      <p class="en" style="display: block;">Let's go to the market and buy fruit!</p>
      <p class="cn" style="display: none;">我们去超市买水果吧!</p>
    </div>

    <div class="english-translate">
      <p class="en" style="display: block;">What are you looking for?</p>
      <p class="cn" style="display: none;">你在找什么?</p>
    </div>

    <div class="mandarin-translate">
      <p class="en" style="display: none;">I'm learning Mandarin</p>
      <p class="cn" style="display: block;">我在学韩语！</p>
    </div>

    <div class="mandarin-translate">
      <p class="en" style="display: none;">I don't know!</p>
      <p class="cn" style="display: block;">我不知道啊！</p>
    </div>
  </section>

  <script
  src="https://code.jquery.com/jquery-4.0.0.min.js"
  integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
  crossorigin="anonymous"
></script>

<script>
  $('.english-translate').mouseover(function () {
    $(this).find('.en').css('display', 'none');
    $(this).find('.cn').css('display', 'block');
  });
  $('.english-translate').mouseout(function () {
    $(this).find('.en').css('display', 'block');
    $(this).find('.cn').css('display', 'none');
  });

  $('.mandarin-translate').mouseover(function () {
    $(this).find('.cn').css('display', 'none');
    $(this).find('.en').css('display', 'block');
  });
  $('.mandarin-translate').mouseout(function () {
    $(this).find('.cn').css('display', 'block');
    $(this).find('.en').css('display', 'none');
  });
</script>
</body>
</html>
